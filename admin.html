<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAPZCODES — Admin Dashboard</title>
<meta name="robots" content="noindex,nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg:#f5f9f5; --s1:#eaf2ea; --s2:#ddeedd;
  --g:#22a032; --glt:#3ddc50;
  --text:#0a100a; --gr:#3a4a3a; --mu:#5a6e5a;
  --bd:rgba(34,160,50,.18); --bd2:rgba(0,0,0,.08);
  --r:10px;
  --fh:'Rajdhani',sans-serif;
  --fb:'Exo 2',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --shadow:0 2px 20px rgba(0,0,0,.06);
}

html{overflow-x:hidden}
body{
  background:var(--bg); color:var(--text);
  font-family:var(--fb);
  min-height:100vh;
}

/* ── HEADER ── */
.hdr {
  position:sticky; top:0; z-index:100;
  background:rgba(245,249,245,.94);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bd);
  padding:14px 5%;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:var(--shadow);
}
.brand { display:flex; align-items:center; gap:12px }
.brand-logo {
  width:34px; height:34px;
  background:linear-gradient(135deg,var(--g),var(--glt));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fh); font-weight:700; color:#fff; font-size:.9rem;
  letter-spacing:.04em;
  box-shadow:0 0 14px rgba(34,160,50,.3);
}
.brand-t { font-family:var(--fh); font-size:1.05rem; font-weight:700; letter-spacing:.05em }
.brand-t .z { color:var(--g) }
.brand-sub { font-family:var(--fm); font-size:.6rem; color:var(--mu); letter-spacing:.12em; text-transform:uppercase; margin-top:2px }
.hdr-r { display:flex; align-items:center; gap:12px }
.hdr-btn {
  font-family:var(--fh); font-weight:600;
  font-size:.78rem; letter-spacing:.05em;
  background:transparent; border:1px solid var(--bd2);
  color:var(--gr); padding:8px 16px; border-radius:6px;
  cursor:pointer; transition:all .2s;
}
.hdr-btn:hover { border-color:var(--g); color:var(--g) }
.hdr-btn.pri { background:var(--g); color:#fff; border-color:var(--g) }
.hdr-btn.pri:hover { background:#1a8028; box-shadow:0 0 14px rgba(34,160,50,.25); color:#fff }

/* ── LOGIN GATE ── */
.gate {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:0 5%;
}
.gate-card {
  background:var(--s1); border:1px solid var(--bd);
  border-radius:14px; padding:44px 5%;
  max-width:440px; width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.06);
  text-align:center;
  position:relative; overflow:hidden;
}
.gate-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:3px; background:linear-gradient(90deg,var(--g),var(--glt));
}
.gate-tag {
  font-family:var(--fm); font-size:.62rem;
  text-transform:uppercase; letter-spacing:.14em;
  color:var(--g); margin-bottom:14px;
}
.gate-h {
  font-family:var(--fh); font-size:1.7rem; font-weight:700;
  letter-spacing:.03em; margin-bottom:8px;
}
.gate-p { color:var(--gr); font-size:.9rem; margin-bottom:28px }
.gate-inp {
  width:100%; padding:13px 16px;
  background:var(--bg); border:1px solid var(--bd2);
  border-radius:7px; font-family:var(--fm); font-size:.9rem;
  color:var(--text); outline:none; margin-bottom:14px;
  transition:border-color .2s, box-shadow .2s;
}
.gate-inp:focus { border-color:var(--g); box-shadow:0 0 0 3px rgba(34,160,50,.1) }
.gate-btn {
  width:100%; padding:13px;
  background:var(--g); color:#fff; border:none;
  font-family:var(--fh); font-weight:700; font-size:.95rem;
  letter-spacing:.05em; border-radius:7px; cursor:pointer;
  transition:all .2s;
}
.gate-btn:hover { background:#1a8028; box-shadow:0 0 18px rgba(34,160,50,.25) }
.gate-err { color:#c92929; font-size:.82rem; margin-top:12px; min-height:20px }

/* ── DASHBOARD ── */
.dash { display:none; padding:28px 5% 60px }
.dash.show { display:block }

.toolbar {
  display:flex; gap:14px; flex-wrap:wrap;
  align-items:center; justify-content:space-between;
  margin-bottom:20px;
}
.tb-l { display:flex; gap:10px; flex-wrap:wrap; align-items:center }
.tb-r { display:flex; gap:10px; flex-wrap:wrap; align-items:center }

.search {
  position:relative;
}
.search input {
  background:var(--s1); border:1px solid var(--bd2);
  padding:10px 14px 10px 38px; border-radius:7px;
  font-family:var(--fb); font-size:.88rem;
  color:var(--text); width:280px; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.search input:focus { border-color:var(--g); box-shadow:0 0 0 3px rgba(34,160,50,.1) }
.search::before {
  content:'⌕'; position:absolute;
  left:14px; top:50%; transform:translateY(-50%);
  color:var(--mu); font-size:1.05rem;
}

.fchip {
  font-family:var(--fm); font-size:.7rem;
  text-transform:uppercase; letter-spacing:.1em;
  background:var(--s1); border:1px solid var(--bd2);
  color:var(--gr); padding:8px 14px; border-radius:6px;
  cursor:pointer; transition:all .2s;
  display:inline-flex; align-items:center; gap:6px;
}
.fchip:hover { border-color:var(--g); color:var(--g) }
.fchip.on  { background:var(--g); color:#fff; border-color:var(--g) }
.fchip .ct { font-family:var(--fm); font-size:.66rem; opacity:.85 }

/* stat strip */
.strip {
  display:grid; grid-template-columns:repeat(4,1fr); gap:1px;
  border:1px solid var(--bd2); border-radius:var(--r);
  overflow:hidden; margin-bottom:24px; background:var(--bd2);
}
.scell { background:var(--bg); padding:18px 20px }
.sn { font-family:var(--fh); font-size:1.7rem; font-weight:700; color:var(--g); line-height:1 }
.sl { font-family:var(--fm); font-size:.66rem; color:var(--mu); margin-top:6px; letter-spacing:.08em; text-transform:uppercase }

/* table */
.tbl-wrap {
  background:var(--bg); border:1px solid var(--bd2);
  border-radius:var(--r); overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.tbl {
  width:100%; border-collapse:collapse;
  font-size:.85rem;
}
.tbl thead th {
  background:var(--s1);
  text-align:left; padding:14px 16px;
  font-family:var(--fm); font-size:.66rem;
  text-transform:uppercase; letter-spacing:.1em;
  color:var(--g); border-bottom:1px solid var(--bd2);
  white-space:nowrap;
}
.tbl tbody td {
  padding:14px 16px;
  border-bottom:1px solid var(--bd2);
  vertical-align:top;
  color:var(--gr);
}
.tbl tbody tr { transition:background .15s; cursor:pointer }
.tbl tbody tr:hover { background:rgba(34,160,50,.04) }
.tbl tbody tr:last-child td { border-bottom:none }
.tnm { font-family:var(--fh); font-weight:700; color:var(--text); font-size:.95rem; letter-spacing:.02em }
.tdept { font-family:var(--fm); font-size:.7rem; color:var(--mu); margin-top:2px; letter-spacing:.04em }
.tts { font-family:var(--fm); font-size:.72rem; color:var(--mu); white-space:nowrap }

.tag-pill {
  display:inline-block; padding:3px 10px; border-radius:4px;
  font-family:var(--fm); font-size:.64rem;
  letter-spacing:.08em; text-transform:uppercase;
}
.tp-online  { background:rgba(34,160,50,.1);  color:var(--g);     border:1px solid rgba(34,160,50,.2) }
.tp-offline { background:rgba(160,90,34,.08); color:#a06022;      border:1px solid rgba(160,90,34,.2) }
.tp-hybrid  { background:rgba(34,90,160,.08); color:#225aa0;      border:1px solid rgba(34,90,160,.2) }

.st-pill {
  display:inline-block; padding:3px 10px; border-radius:4px;
  font-family:var(--fm); font-size:.64rem;
  letter-spacing:.08em; text-transform:uppercase; font-weight:500;
}
.st-new       { background:rgba(34,160,50,.1);  color:var(--g);  border:1px solid rgba(34,160,50,.2) }
.st-contacted { background:rgba(34,90,160,.08); color:#225aa0;   border:1px solid rgba(34,90,160,.2) }
.st-enrolled  { background:rgba(160,90,34,.08); color:#a06022;   border:1px solid rgba(160,90,34,.2) }
.st-dropped   { background:rgba(140,140,140,.1);color:#888;       border:1px solid rgba(140,140,140,.25) }

.mini-link {
  font-family:var(--fm); font-size:.78rem;
  color:var(--g); text-decoration:none;
  display:inline-flex; align-items:center; gap:5px;
}
.mini-link:hover { text-decoration:underline }

.empty {
  text-align:center; padding:80px 20px; color:var(--mu);
  font-size:.9rem;
}
.empty-i { font-size:2.4rem; opacity:.4; margin-bottom:14px }

/* ── DETAIL DRAWER ── */
.bd-back {
  display:none;
  position:fixed; inset:0;
  background:rgba(10,16,10,.4);
  backdrop-filter:blur(4px);
  z-index:200;
}
.bd-back.show { display:block }
.drw {
  position:fixed; top:0; right:0; bottom:0;
  width:min(540px,92vw);
  background:var(--bg);
  border-left:1px solid var(--bd);
  z-index:201;
  transform:translateX(100%);
  transition:transform .3s ease;
  overflow-y:auto;
  box-shadow:-20px 0 60px rgba(0,0,0,.12);
}
.drw.show { transform:translateX(0) }
.drw-h {
  position:sticky; top:0;
  background:var(--s1); border-bottom:1px solid var(--bd);
  padding:18px 24px;
  display:flex; align-items:center; justify-content:space-between;
}
.drw-h .name {
  font-family:var(--fh); font-size:1.3rem; font-weight:700;
  letter-spacing:.03em;
}
.drw-h .sub { font-family:var(--fm); font-size:.7rem; color:var(--mu); letter-spacing:.08em; margin-top:2px; text-transform:uppercase }
.drw-x {
  width:32px; height:32px; border-radius:6px;
  background:var(--bg); border:1px solid var(--bd2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1.1rem; color:var(--gr);
  transition:all .2s;
}
.drw-x:hover { border-color:var(--g); color:var(--g) }
.drw-b { padding:24px }

.dline { display:flex; gap:14px; margin-bottom:18px }
.dico {
  width:36px; height:36px; flex-shrink:0;
  background:var(--s1); border:1px solid var(--bd2);
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:.95rem; color:var(--g);
}
.dlbl { font-family:var(--fm); font-size:.62rem; color:var(--mu); letter-spacing:.1em; text-transform:uppercase; margin-bottom:3px }
.dval { font-size:.92rem; color:var(--text); line-height:1.5; word-break:break-word }
.dval a { color:var(--g); text-decoration:none }
.dval a:hover { text-decoration:underline }

.drw-actions {
  display:flex; gap:10px; flex-wrap:wrap;
  padding-top:16px; border-top:1px solid var(--bd2);
  margin-top:8px;
}
.drw-actions a {
  flex:1; min-width:120px;
  text-align:center; padding:11px 14px;
  font-family:var(--fh); font-weight:700; font-size:.85rem;
  letter-spacing:.04em; border-radius:7px;
  text-decoration:none; transition:all .2s;
}
.act-wa { background:#25d366; color:#fff }
.act-wa:hover { background:#1eb852 }
.act-call { background:var(--g); color:#fff }
.act-call:hover { background:#1a8028 }
.act-mail { background:transparent; color:var(--g); border:1px solid var(--g) }
.act-mail:hover { background:rgba(34,160,50,.06) }

.tags-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px }

@media(max-width:900px) {
  .strip { grid-template-columns:repeat(2,1fr) }
  .search input { width:200px }
  .tbl tbody td, .tbl thead th { padding:11px 12px; font-size:.82rem }
  .hide-sm { display:none }
}
@media(max-width:560px) {
  .toolbar { flex-direction:column; align-items:stretch }
  .tb-l, .tb-r { width:100%; justify-content:flex-start }
  .search input { width:100% }
  .strip { grid-template-columns:1fr 1fr }
}
</style>
</head>
<body>

<!-- ───── LOGIN GATE ───── -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-tag">Internal Access</div>
    <h1 class="gate-h">SAPZ<span style="color:var(--g)">CODES</span> Admin</h1>
    <p class="gate-p">Enter your admin key to view student enquiries.</p>
    <input type="password" class="gate-inp" id="key-in" placeholder="Admin key" autocomplete="off" autofocus>
    <button class="gate-btn" id="login-btn">Sign In</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- ───── DASHBOARD ───── -->
<header class="hdr" id="hdr" style="display:none">
  <div class="brand">
    <div class="brand-logo">SZ</div>
    <div>
      <div class="brand-t">SAPZ<span class="z">CODES</span></div>
      <div class="brand-sub">Enrollments Dashboard</div>
    </div>
  </div>
  <div class="hdr-r">
    <button class="hdr-btn" id="refresh">↻ Refresh</button>
    <button class="hdr-btn" id="export">⇓ Export CSV</button>
    <button class="hdr-btn pri" id="logout">Sign Out</button>
  </div>
</header>

<main class="dash" id="dash">

  <div class="strip">
    <div class="scell">
      <div class="sn" id="stat-total">0</div>
      <div class="sl">Total Enquiries</div>
    </div>
    <div class="scell">
      <div class="sn" id="stat-new">0</div>
      <div class="sl">New / Pending</div>
    </div>
    <div class="scell">
      <div class="sn" id="stat-week">0</div>
      <div class="sl">This Week</div>
    </div>
    <div class="scell">
      <div class="sn" id="stat-enrolled">0</div>
      <div class="sl">Enrolled</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="tb-l">
      <div class="search"><input type="text" id="q" placeholder="Search name, phone, email, dept…"></div>
    </div>
    <div class="tb-r">
      <button class="fchip on" data-f="all">All <span class="ct" id="c-all">0</span></button>
      <button class="fchip" data-f="New">New <span class="ct" id="c-new">0</span></button>
      <button class="fchip" data-f="Contacted">Contacted <span class="ct" id="c-c">0</span></button>
      <button class="fchip" data-f="Enrolled">Enrolled <span class="ct" id="c-e">0</span></button>
      <button class="fchip" data-f="Dropped">Dropped <span class="ct" id="c-d">0</span></button>
    </div>
  </div>

  <div class="tbl-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th>Student</th>
          <th class="hide-sm">Phone</th>
          <th class="hide-sm">Mode / Slot</th>
          <th class="hide-sm">Year</th>
          <th>Status</th>
          <th class="hide-sm">Submitted</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-i">∅</div>
      <div>No enquiries match your filters.</div>
    </div>
  </div>

</main>

<!-- ───── DETAIL DRAWER ───── -->
<div class="bd-back" id="bdback"></div>
<aside class="drw" id="drw" aria-hidden="true">
  <div class="drw-h">
    <div>
      <div class="name" id="d-name">—</div>
      <div class="sub" id="d-sub">—</div>
    </div>
    <button class="drw-x" id="d-close" aria-label="Close">✕</button>
  </div>
  <div class="drw-b" id="d-body"></div>
</aside>

<script>
/* ============== CONFIG ==============
   Paste the SAME Apps Script Web App URL used in enroll.html.
   The ADMIN_KEY must match what you set in Code.gs.
   ===================================== */
const ENDPOINT = 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';
const STORAGE_KEY = 'sapz_admin_key_v1';
/* ===================================== */

const $ = (id) => document.getElementById(id);

let allRows = [];
let activeFilter = 'all';
let activeQuery = '';
let adminKey = '';

/* ── login ── */
function showGate()  { $('gate').style.display = 'flex'; $('hdr').style.display = 'none'; $('dash').classList.remove('show'); }
function showDash()  { $('gate').style.display = 'none'; $('hdr').style.display = 'flex'; $('dash').classList.add('show'); }

async function tryLogin(key) {
  $('gate-err').textContent = '';
  if (!key) { $('gate-err').textContent = 'Please enter the admin key.'; return; }
  if (ENDPOINT.startsWith('PASTE_')) { $('gate-err').textContent = 'ENDPOINT not configured in admin.html.'; return; }

  $('login-btn').textContent = 'Verifying…';
  $('login-btn').disabled = true;
  try {
    const res = await fetch(`${ENDPOINT}?action=list&key=${encodeURIComponent(key)}`, { method: 'GET' });
    const data = await res.json();
    if (data.ok) {
      adminKey = key;
      sessionStorage.setItem(STORAGE_KEY, key);
      allRows = data.rows || [];
      showDash();
      render();
    } else {
      $('gate-err').textContent = data.error || 'Invalid admin key.';
    }
  } catch (err) {
    $('gate-err').textContent = 'Network error. Try again.';
  } finally {
    $('login-btn').textContent = 'Sign In';
    $('login-btn').disabled = false;
  }
}

$('login-btn').addEventListener('click', () => tryLogin($('key-in').value.trim()));
$('key-in').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin($('key-in').value.trim()) });

$('logout').addEventListener('click', () => {
  sessionStorage.removeItem(STORAGE_KEY);
  adminKey = '';
  $('key-in').value = '';
  showGate();
});

/* ── refresh ── */
async function refresh() {
  if (!adminKey) return;
  $('refresh').textContent = '⟳ Loading…';
  try {
    const res = await fetch(`${ENDPOINT}?action=list&key=${encodeURIComponent(adminKey)}`);
    const data = await res.json();
    if (data.ok) { allRows = data.rows || []; render(); }
    else { alert(data.error || 'Failed to load'); }
  } catch (e) { alert('Network error'); }
  finally { $('refresh').textContent = '↻ Refresh'; }
}
$('refresh').addEventListener('click', refresh);

/* ── render ── */
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const yest = new Date(today); yest.setDate(today.getDate() - 1);
  const isYest = d.toDateString() === yest.toDateString();
  if (sameDay) return 'Today, ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  if (isYest) return 'Yesterday, ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString([], {day:'2-digit',month:'short'}) + ', ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function modeClass(m) {
  m = (m||'').toLowerCase();
  if (m.includes('online'))  return 'tp-online';
  if (m.includes('offline')) return 'tp-offline';
  return 'tp-hybrid';
}
function statusClass(s) {
  s = (s||'').toLowerCase();
  if (s === 'contacted') return 'st-contacted';
  if (s === 'enrolled')  return 'st-enrolled';
  if (s === 'dropped')   return 'st-dropped';
  return 'st-new';
}

function passQuery(r, q) {
  if (!q) return true;
  q = q.toLowerCase();
  return [r.name, r.phone, r.email, r.department, r.fatherName, r.address]
    .some(v => String(v||'').toLowerCase().includes(q));
}
function passFilter(r, f) {
  if (f === 'all') return true;
  return String(r.status||'New').toLowerCase() === f.toLowerCase();
}

function render() {
  // counters
  const counts = { all:0, New:0, Contacted:0, Enrolled:0, Dropped:0 };
  const now = Date.now();
  let weekCount = 0;
  allRows.forEach(r => {
    counts.all++;
    const s = (r.status || 'New');
    if (counts[s] !== undefined) counts[s]++;
    const t = new Date(r.timestamp).getTime();
    if (!isNaN(t) && now - t < 7*24*3600*1000) weekCount++;
  });

  $('stat-total').textContent = counts.all;
  $('stat-new').textContent = counts.New;
  $('stat-week').textContent = weekCount;
  $('stat-enrolled').textContent = counts.Enrolled;
  $('c-all').textContent = counts.all;
  $('c-new').textContent = counts.New;
  $('c-c').textContent = counts.Contacted;
  $('c-e').textContent = counts.Enrolled;
  $('c-d').textContent = counts.Dropped;

  // filtered rows (newest first)
  const visible = allRows
    .filter(r => passFilter(r, activeFilter) && passQuery(r, activeQuery))
    .sort((a, b) => {
      const ta = new Date(a.timestamp).getTime() || 0;
      const tb = new Date(b.timestamp).getTime() || 0;
      return tb - ta;
    });

  const tbody = $('rows');
  tbody.innerHTML = '';
  if (visible.length === 0) {
    $('empty').style.display = 'block';
    return;
  }
  $('empty').style.display = 'none';

  visible.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="tnm">${esc(r.name)}</div>
        <div class="tdept">${esc(r.department)} · ${esc(r.email)}</div>
      </td>
      <td class="hide-sm"><span style="font-family:var(--fm);font-size:.82rem;color:var(--text)">${esc(r.phone)}</span></td>
      <td class="hide-sm">
        <span class="tag-pill ${modeClass(r.mode)}">${esc(r.mode)}</span>
        <div class="tdept" style="margin-top:4px">${esc(r.slot)}${r.otherSlot ? ' · '+esc(r.otherSlot) : ''}</div>
      </td>
      <td class="hide-sm"><span style="font-size:.82rem">${esc(r.year)}</span></td>
      <td><span class="st-pill ${statusClass(r.status)}">${esc(r.status||'New')}</span></td>
      <td class="hide-sm"><span class="tts">${fmtDate(r.timestamp)}</span></td>
    `;
    tr.addEventListener('click', () => openDrawer(r));
    tbody.appendChild(tr);
  });
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── drawer ── */
function openDrawer(r) {
  $('d-name').textContent = r.name || '—';
  $('d-sub').textContent  = (r.department || '') + (r.year ? ' · ' + r.year : '');

  const interests = [];
  if (yes(r.practiceServer))      interests.push('Practice Server');
  if (yes(r.expertTraining))      interests.push('Expert Training');
  if (yes(r.placementAssistance)) interests.push('Placement');
  if (yes(r.internship))          interests.push('Internship');
  const interestsHTML = interests.length
    ? `<div class="tags-row">${interests.map(i=>`<span class="tag-pill tp-online">${esc(i)}</span>`).join('')}</div>`
    : `<span style="color:var(--mu);font-size:.85rem">None marked</span>`;

  const phoneClean = String(r.phone||'').replace(/\D/g,'');
  const wa  = phoneClean ? `https://wa.me/${phoneClean.length===10 ? '91'+phoneClean : phoneClean}` : '#';
  const tel = phoneClean ? `tel:${phoneClean}` : '#';
  const mail= r.email ? `mailto:${r.email}` : '#';

  $('d-body').innerHTML = `
    <div class="dline"><div class="dico">📞</div><div><div class="dlbl">Phone</div><div class="dval"><a href="${tel}">${esc(r.phone)}</a></div></div></div>
    <div class="dline"><div class="dico">✉</div><div><div class="dlbl">Email</div><div class="dval"><a href="${mail}">${esc(r.email)}</a></div></div></div>
    <div class="dline"><div class="dico">👤</div><div><div class="dlbl">Father's Name</div><div class="dval">${esc(r.fatherName)}</div></div></div>
    <div class="dline"><div class="dico">📍</div><div><div class="dlbl">Address</div><div class="dval">${esc(r.address)}</div></div></div>
    <div class="dline"><div class="dico">🎓</div><div><div class="dlbl">Department / Year</div><div class="dval">${esc(r.department)} · ${esc(r.year)}</div></div></div>
    <div class="dline"><div class="dico">⚙</div><div><div class="dlbl">Mode</div><div class="dval"><span class="tag-pill ${modeClass(r.mode)}">${esc(r.mode)}</span></div></div></div>
    <div class="dline"><div class="dico">🕒</div><div><div class="dlbl">Slot</div><div class="dval">${esc(r.slot)}${r.otherSlot ? ' — '+esc(r.otherSlot) : ''}</div></div></div>
    <div class="dline"><div class="dico">★</div><div><div class="dlbl">Interests</div><div class="dval">${interestsHTML}</div></div></div>
    <div class="dline"><div class="dico">↗</div><div><div class="dlbl">Source</div><div class="dval">${esc(r.source) || '—'}</div></div></div>
    <div class="dline"><div class="dico">⏱</div><div><div class="dlbl">Submitted</div><div class="dval">${fmtDate(r.timestamp)}</div></div></div>
    ${r.notes ? `<div class="dline"><div class="dico">📝</div><div><div class="dlbl">Internal Notes</div><div class="dval">${esc(r.notes)}</div></div></div>` : ''}

    <div class="drw-actions">
      <a class="act-wa"   href="${wa}"  target="_blank" rel="noopener">WhatsApp</a>
      <a class="act-call" href="${tel}">Call</a>
      <a class="act-mail" href="${mail}">Email</a>
    </div>

    <div style="margin-top:18px;font-family:var(--fm);font-size:.7rem;color:var(--mu);letter-spacing:.06em">
      To change status / add notes, edit row ${r._rowIndex} directly in the Google Sheet.
    </div>
  `;
  $('drw').classList.add('show');
  $('bdback').classList.add('show');
}
function closeDrawer() {
  $('drw').classList.remove('show');
  $('bdback').classList.remove('show');
}
$('d-close').addEventListener('click', closeDrawer);
$('bdback').addEventListener('click', closeDrawer);
addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer() });

function yes(v) { return v === 'Yes' || v === true || v === 'yes' }

/* ── filters / search ── */
document.querySelectorAll('.fchip').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fchip').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    activeFilter = b.dataset.f;
    render();
  });
});
$('q').addEventListener('input', e => { activeQuery = e.target.value.trim(); render(); });

/* ── export ── */
$('export').addEventListener('click', () => {
  if (allRows.length === 0) { alert('No data to export'); return; }
  const cols = ['timestamp','name','fatherName','phone','email','department','year','address','mode','slot','otherSlot','practiceServer','expertTraining','placementAssistance','internship','source','status','notes'];
  const csv = [cols.join(',')].concat(
    allRows.map(r => cols.map(c => `"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))
  ).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sapzcodes-enrollments-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

/* ── auto-login if key cached for this session ── */
const cached = sessionStorage.getItem(STORAGE_KEY);
if (cached) tryLogin(cached);
</script>

</body>
</html>
